services:
  # ========== BACKEND SERVICE ==========
  - type: web
    name: certificate-generator-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.10.0
    plan: free

  # ========== FRONTEND SERVICE ==========
  - type: static
    name: certificate-generator-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://certificate-generator-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
